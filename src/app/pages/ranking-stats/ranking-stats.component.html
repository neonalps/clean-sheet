<section class="px-3 pb-8">
    <div class="flex align-items-center justify-content-between">
        <div class="page-title mb-5 ml-1">{{ titleText() }}</div>
        <div class="pointer" (click)="showFilterModal()">f</div>
    </div>
    <div>
        <div class="flex align-items-center justify-content-center mb-6">
            <app-chip-group [chipGroup$]="forMainChipGroupInput" (onSelected)="onForMainChipSelected($event)"  />
        </div>
        <app-paginated-ranked-person-list [listItems]="playerStats()" (nearEndReached)="onNearEndReached()" />
    </div>
</section>
