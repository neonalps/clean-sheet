@let isLoadingValue = isLoading();
@let appStatsRowsValue = appStatsRows();
<section class="px-3 pb-8">
    <div class="flex align-items-center justify-content-between">
        <div class="page-title mb-5 ml-1">{{ 'menu.applicationStats' | $t }}</div>
    </div>
    <div>
        <ng-container *ngIf="isLoadingValue; else loadedContent">
            <div class="flex align-items-center justify-content-center py-3">
                <div class="loading-container-medium">
                    <app-loading />
                </div>
            </div>
        </ng-container>
        <ng-template #loadedContent>
            @for (statsRow of appStatsRowsValue; track $index) {
                <div class="flex justify-content-evenly mb-4">
                    @for (statsItem of statsRow; track $index) {
                        <div class="basis-1/3 flex flex-col align-items-center justify-content-center p-2 mx-1 rounded-lg">
                            <div *ngIf="statsItem.icon" [attr.title]="statsItem.text">
                                <div class="width-1-25rem text-light" [ngClass]="statsItem.iconClasses">
                                    <app-ui-icon [descriptor]="statsItem.icon" />
                                </div>
                            </div>
                            <div>
                                <span>{{ statsItem.value | formatNumber }}</span>
                            </div>
                            <div class="flex-grow flex align-items-center mt-2 text-xs center text-light-grey-darker">{{ statsItem.text }}</div>
                        </div>
                    }
                </div>
            }
        </ng-template>
    </div>
</section>
