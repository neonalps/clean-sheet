<button class="button transition-colors flex min-h-42" [ngClass]="getDynamicClasses()" (click)="onClick()">
    <div class="flex align-items-center" [ngClass]="{ 'px-3': !iconOnly() }">
        <div *ngIf="icon" [ngClass]="{ 'mr-3': !iconOnly() }">
            <div class="width-sm relative top-1">
                <app-ui-icon [descriptor]="icon" />
            </div>
        </div>
        <div *ngIf="text" class="text-base">
            {{ text }}
        </div>
        <div class="ml-3" *ngIf="iconRight">
            <div class="width-sm">
                <app-ui-icon [descriptor]="iconRight" />
            </div>
        </div>
    </div>
</button>
